x-eureka-server-url: &eureka_server_url http://discovery-server-a:8761/eureka,http://discovery-server-b:8761/eureka

services:
  mysql:
    image: mysql:8.0
    container_name: elm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: elm
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - elm-network

  mysql-init:
    image: mysql:8.0
    container_name: elm-mysql-init
    depends_on:
      mysql:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "mysql -hmysql -uroot -p$${DB_PASSWORD} -e \"CREATE DATABASE IF NOT EXISTS elm CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; CREATE DATABASE IF NOT EXISTS elm_points CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; CREATE DATABASE IF NOT EXISTS elm_account CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; CREATE DATABASE IF NOT EXISTS elm_catalog CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; CREATE DATABASE IF NOT EXISTS elm_cart CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; CREATE DATABASE IF NOT EXISTS elm_order CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; CREATE DATABASE IF NOT EXISTS elm_address CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;\"",
      ]
    environment:
      DB_PASSWORD: ${DB_PASSWORD:-root}
    restart: "no"
    networks:
      - elm-network

  config-server:
    build:
      context: ./elm-microservice/config-server
      dockerfile: Dockerfile
    container_name: config-server
    restart: unless-stopped
    environment:
      CONFIG_REPO_PATH: /config-repo
    volumes:
      - ./spring-cloud-config-repo:/config-repo:ro
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8888/actuator/health | grep '\"status\":\"UP\"' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - elm-network

  discovery-server-a:
    build:
      context: ./elm-microservice/discovery-server
      dockerfile: Dockerfile
    container_name: discovery-server-a
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_HOSTNAME: discovery-server-a
      EUREKA_REGISTER_WITH_EUREKA: "true"
      EUREKA_FETCH_REGISTRY: "true"
      EUREKA_DEFAULT_ZONE: http://discovery-server-b:8761/eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health | grep '\"status\":\"UP\"' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      elm-network:
        aliases:
          - discovery-server

  discovery-server-b:
    build:
      context: ./elm-microservice/discovery-server
      dockerfile: Dockerfile
    container_name: discovery-server-b
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_HOSTNAME: discovery-server-b
      EUREKA_REGISTER_WITH_EUREKA: "true"
      EUREKA_FETCH_REGISTRY: "true"
      EUREKA_DEFAULT_ZONE: http://discovery-server-a:8761/eureka
      SERVER_PORT: 8761
    ports:
      - "8762:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health | grep '\"status\":\"UP\"' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      elm-network:
        aliases:
          - discovery-server

  points-service:
    build:
      context: ./elm-microservice/points-service
      dockerfile: Dockerfile
    container_name: points-service
    restart: unless-stopped
    depends_on:
      mysql-init:
        condition: service_completed_successfully
      discovery-server-a:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/elm_points?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: *eureka_server_url
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env before docker compose up}
    command: ["--spring.profiles.active=cloud", "--eureka.instance.instance-id=points-service-8081"]
    ports:
      - "8081:8081"
    healthcheck:
