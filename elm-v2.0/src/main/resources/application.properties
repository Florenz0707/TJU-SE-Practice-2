spring.application.name=elm
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/elm?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.sql.init.encoding=utf-8
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=update

jwt.header=Authorization
jwt.secret=mySecret
jwt.expiration=604800
jwt.route.authentication.path=/auth
jwt.route.authentication.refresh=/refresh

server.port=8080
server.servlet.context-path=/elm
# better readable jackson serialization format
spring.jackson.serialization.INDENT_OUTPUT=true
# URL: jdbc:h2:mem:testdb
devtools.restart.enabled=true
# This token must be encoded using Base64 with mininum 88 Bits (you can type `echo 'secret-key'|base64` on your command line)
jwt.base64-secret=ZmQ0ZGI5NjQ0MDQwY2I4MjMxY2Y3ZmI3MjdhN2ZmMjNhODViOTg1ZGE0NTBjMGM4NDA5NzYxMjdjOWMwYWRmZTBlZjlhNGY3ZTg4Y2U3YTE1ODVkZDU5Y2Y3OGYwZWE1NzUzNWQ2YjFjZDc0NGMxZWU2MmQ3MjY1NzJmNTE0MzI=
# token is valid 24 hours
jwt.token-validity-in-seconds=86400
# valid 30 hours
jwt.token-validity-in-seconds-for-remember-me=108000
# Internal service token for inter-service communication
# This token should be kept secret and only shared between internal services
internal.service.token=${INTERNAL_SERVICE_TOKEN}
points.service.url=${POINTS_SERVICE_URL:http://localhost:8081/elm}
account.service.url=${ACCOUNT_SERVICE_URL:http://localhost:8082/elm}
user.service.url=${USER_SERVICE_URL:http://localhost:8086/elm}
business.service.url=${BUSINESS_SERVICE_URL:http://localhost:8083/elm}
food.service.url=${FOOD_SERVICE_URL:http://localhost:8087/elm}
order.service.url=${ORDER_SERVICE_URL:http://localhost:8084/elm}
cart.service.url=${CART_SERVICE_URL:http://localhost:8089/elm}
logging.level.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} traceId=%X{traceId:-} spanId=%X{spanId:-} requestId=%X{requestId:-} userId=%X{userId:-} orderId=%X{orderId:-} - %msg%n
