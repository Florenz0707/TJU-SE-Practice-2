spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
eureka.client.enabled=true
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.prefer-ip-address=true
points.service.url=${POINTS_SERVICE_URL:http://points-service/elm}
account.service.url=${ACCOUNT_SERVICE_URL:http://account-service/elm}
user.service.url=${USER_SERVICE_URL:http://user-service/elm}
business.service.url=${BUSINESS_SERVICE_URL:http://business-service/elm}
food.service.url=${FOOD_SERVICE_URL:http://food-service/elm}
order.service.url=${ORDER_SERVICE_URL:http://order-service/elm}
cart.service.url=${CART_SERVICE_URL:http://cart-service/elm}
address.service.url=${ADDRESS_SERVICE_URL:http://address-service/elm}
