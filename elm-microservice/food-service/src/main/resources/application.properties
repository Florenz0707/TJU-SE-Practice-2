spring.application.name=food-service
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/elm_catalog?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update

server.port=8087
server.servlet.context-path=/elm
internal.service.token=${INTERNAL_SERVICE_TOKEN}
business.service.url=${BUSINESS_SERVICE_URL:http://localhost:8083/elm}
