spring.application.name=merchant-service
server.port=8085
server.servlet.context-path=/elm

# Database (defaults can be overridden via docker-compose environment)
spring.datasource.url=${DB_URL:jdbc:mysql://mysql:3306/elm_merchant?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:elm}
spring.datasource.password=${DB_PASSWORD:elm}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

# Internal service call token (must match user-service)
internal.service.token=internal-service-secret-token-2024
