upstream monolith_backend {
    server gateway:8080;
}

# Stage-0 gateway skeleton: all upstreams still point to monolith.
upstream iam_service {
    server gateway:8080;
}
upstream points_service {
    server gateway:8080;
}
upstream account_service {
    server gateway:8080;
}
upstream catalog_service {
    server gateway:8080;
}
upstream order_service {
    server gateway:8080;
}

server {
    listen       80;
    server_name  localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Frontend compatibility: keep existing /api/** path, rewrite to /elm/api/**.
        # Forward API calls to gateway
        # Note: frontend axios baseURL is `/api`, so we rewrite `/api/*` -> gateway `/elm/api/*`.
        location /api/ {
            proxy_pass http://gateway:8080/elm/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
        }

    # IAM routes (future split target: iam-service).
    location ~ ^/elm/api/(auth|users|user|persons|password)(/|$) {
        proxy_pass http://iam_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }

    # Points routes (future split target: points-service).
    location ~ ^/elm/api/points(/|$) {
        proxy_pass http://points_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }

    # Account routes (future split target: account-service).
    location ~ ^/elm/api/(wallet|transactions|vouchers|publicVoucher|privateVoucher)(/|$) {
        proxy_pass http://account_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }

    # Catalog routes (future split target: catalog-service).
    location ~ ^/elm/api/(businesses|foods|applications/business|applications/merchant)(/|$) {
        proxy_pass http://catalog_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }

    # Order routes (future split target: order-service).
    location ~ ^/elm/api/(orders|carts|addresses|reviews)(/|$) {
        proxy_pass http://order_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }

    # Default: keep monolith compatibility for any route not yet split.
    location /elm/ {
        proxy_pass http://monolith_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }

    # Backward compatibility for legacy direct API paths without /api prefix.
    location ~ ^/(persons|user|password|businesses|orders|auth|users|carts|addresses|foods|reviews|points|vouchers|wallet|transactions|applications|transaction|publicVoucher|privateVoucher) {
        rewrite ^/(.*)$ /elm/api/$1 break;
        proxy_pass http://monolith_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }
}
