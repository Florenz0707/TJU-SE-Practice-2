spring:
  application:
    name: config-server
  profiles:
    active: ${CONFIG_SERVER_MODE:native}
  cloud:
    config:
      server:
        native:
          search-locations:
            - file:./config
            - classpath:/config
    bus:
      enabled: true
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest

server:
  port: ${SERVER_PORT:8888}

eureka:
  instance:
    instance-id: ${CONFIG_SERVER_INSTANCE_ID:${spring.application.name}:${server.port}}
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health, bus-refresh, bus-env

---
spring:
  config:
    activate:
      on-profile: git
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_GIT_URI:file:/app/config-repo}
          default-label: ${CONFIG_GIT_DEFAULT_LABEL:main}
          clone-on-start: ${CONFIG_GIT_CLONE_ON_START:false}
          force-pull: true
          timeout: 5
