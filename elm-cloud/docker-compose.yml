
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: elm
      MYSQL_USER: elm
      MYSQL_PASSWORD: elm
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - 3306:3306
    networks:
      - elm-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - elm-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  eureka-server:
    build:
      context: .
      dockerfile: ./eureka-server/Dockerfile
    ports:
      - 8761:8761
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - elm-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  config-server-1:
    build:
      context: .
      dockerfile: ./config-server/Dockerfile
    ports:
      - 8888:8888
    environment:
      - SERVER_PORT=8888
      - CONFIG_SERVER_INSTANCE_ID=config-server-1:8888
      - CONFIG_SERVER_MODE=${CONFIG_SERVER_MODE:-native}
      - CONFIG_GIT_URI=${CONFIG_GIT_URI:-file:/app/config-repo}
      - CONFIG_GIT_DEFAULT_LABEL=${CONFIG_GIT_DEFAULT_LABEL:-main}
      - CONFIG_GIT_CLONE_ON_START=${CONFIG_GIT_CLONE_ON_START:-false}
    volumes:
      - ./config:/app/config:ro
      - ./config-repo:/app/config-repo:ro
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - elm-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8888/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  config-server-2:
    build:
      context: .
      dockerfile: ./config-server/Dockerfile
    ports:
      - 8889:8888
    environment:
      - SERVER_PORT=8888
      - CONFIG_SERVER_INSTANCE_ID=config-server-2:8888
      - CONFIG_SERVER_MODE=${CONFIG_SERVER_MODE:-native}
      - CONFIG_GIT_URI=${CONFIG_GIT_URI:-file:/app/config-repo}
      - CONFIG_GIT_DEFAULT_LABEL=${CONFIG_GIT_DEFAULT_LABEL:-main}
      - CONFIG_GIT_CLONE_ON_START=${CONFIG_GIT_CLONE_ON_START:-false}
    volumes:
      - ./config:/app/config:ro
      - ./config-repo:/app/config-repo:ro
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - elm-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8888/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  gateway:
    build:
      context: .
      dockerfile: ./gateway/Dockerfile
    ports:
      - 8080:8080
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server-1:
        condition: service_healthy
      config-server-2:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - elm-network

  merchant-service:
    build:
      context: .
      dockerfile: ./merchant-service/Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=local
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      config-server-1:
        condition: service_healthy
      config-server-2:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - elm-network
    deploy:
      replicas: 2

  product-service:
    build:
      context: .
      dockerfile: ./product-service/Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=local
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      config-server-1:
        condition: service_healthy
      config-server-2:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - elm-network
    deploy:
      replicas: 2

  cart-service:
    build:
      context: .
      dockerfile: ./cart-service/Dockerfile
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      config-server-1:
        condition: service_healthy
      config-server-2:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - elm-network
    deploy:
      replicas: 2

  order-service:
    build:
      context: .
      dockerfile: ./order-service/Dockerfile
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      config-server-1:
        condition: service_healthy
      config-server-2:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - elm-network
    deploy:
      replicas: 2

  address-service:
    build:
      context: .
      dockerfile: ./address-service/Dockerfile
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      config-server-1:
        condition: service_healthy
      config-server-2:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - elm-network

  user-service:
    build:
      context: .
      dockerfile: ./user-service/Dockerfile
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      config-server-1:
        condition: service_healthy
      config-server-2:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - elm-network
    deploy:
      replicas: 2

  points-service:
    build:
      context: .
      dockerfile: ./points-service/Dockerfile
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      config-server-1:
        condition: service_healthy
      config-server-2:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - elm-network

  wallet-service:
    build:
      context: .
      dockerfile: ./wallet-service/Dockerfile
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      config-server-1:
        condition: service_healthy
      config-server-2:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - elm-network

  frontend:
    build:
      context: ./elm-frontend
      dockerfile: Dockerfile
    container_name: elm-frontend-1
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_started
    ports:
      - "80:80"
    networks:
      - elm-network

volumes:
  mysql-data:

networks:
  elm-network:
    driver: bridge
