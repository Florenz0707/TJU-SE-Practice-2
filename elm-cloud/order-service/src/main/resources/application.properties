spring.application.name=order-service
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.url=${DB_URL:jdbc:mysql://mysql:3306/elm_order?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:elm}
spring.datasource.password=${DB_PASSWORD:elm}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update

server.port=8084
server.servlet.context-path=/elm

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

# Spring Cloud LoadBalancer configuration
spring.cloud.loadbalancer.ribbon.enabled=false

# Resilience4j Circuit Breaker configuration
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.event-consumer-buffer-size=10
resilience4j.circuitbreaker.instances.walletService.base-config=default
resilience4j.circuitbreaker.instances.merchantService.base-config=default
resilience4j.circuitbreaker.instances.addressService.base-config=default
resilience4j.circuitbreaker.instances.productService.base-config=default

# Resilience4j Retry configuration
resilience4j.retry.configs.default.max-attempts=3
resilience4j.retry.configs.default.wait-duration=500ms
resilience4j.retry.configs.default.enable-exponential-backoff=true
resilience4j.retry.configs.default.exponential-backoff-multiplier=2
resilience4j.retry.instances.walletService.base-config=default
resilience4j.retry.instances.merchantService.base-config=default
resilience4j.retry.instances.addressService.base-config=default
resilience4j.retry.instances.productService.base-config=default

# Actuator endpoints
management.endpoints.web.exposure.include=health,circuitbreakers
management.endpoint.health.show-details=always
