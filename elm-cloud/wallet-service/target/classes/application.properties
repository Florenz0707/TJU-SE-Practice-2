spring.application.name=wallet-service
server.port=8088
server.servlet.context-path=/elm

# Database (defaults can be overridden by docker-compose environment variables)
spring.datasource.url=${DB_URL:jdbc:mysql://mysql:3306/elm_wallet?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:elm}
spring.datasource.password=${DB_PASSWORD:elm}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
