spring.application.name=product-service
server.port=8091

# Database settings are provided at runtime via docker-compose environment in elm-cloud/docker-compose.yml
# spring.datasource.url=jdbc:mysql://mysql:3306/elm?useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=root
spring.application.name=product-service
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.url=${DB_URL:jdbc:mysql://mysql:3306/elm_catalog?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:elm}
spring.datasource.password=${DB_PASSWORD:elm}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update

server.port=8083
server.servlet.context-path=/elm

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
