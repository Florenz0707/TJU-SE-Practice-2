spring.application.name=cart-service
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.url=${DB_URL:jdbc:mysql://mysql:3306/elm_order?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:elm}
spring.datasource.password=${DB_PASSWORD:elm}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update

server.port=8086
# Keep empty so gateway can route /carts and /api/carts directly.
server.servlet.context-path=

# Eureka registration: advertise a resolvable hostname inside docker network.
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:cart-service}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}:${spring.cloud.client.ip-address}

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

# Spring Cloud LoadBalancer configuration
spring.cloud.loadbalancer.ribbon.enabled=false

# Actuator endpoints
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
